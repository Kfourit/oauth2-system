<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 48px 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 380px;
    }
    h1 { margin: 0 0 8px; font-size: 24px; text-align: center; color: #111; }
    .subtitle { margin: 0 0 28px; color: #666; text-align: center; font-size: 15px; }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #111; }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      outline: none;
      margin-bottom: 16px;
    }
    input[type="email"]:focus, input[type="password"]:focus {
      border-color: #4f46e5;
    }
    button[type="submit"] {
      width: 100%;
      padding: 12px 0;
      font-size: 16px;
      font-weight: 600;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 4px;
    }
    button[type="submit"]:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome</h1>
    <p class="subtitle">Sign in to continue</p>

    <div th:if="${param.error}" class="error">
      Invalid email or password.
    </div>

    <form th:action="@{/login}" method="post">
      <label for="username">Email</label>
      <input type="email" id="username" name="username" placeholder="you@example.com" required autofocus />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />

      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
