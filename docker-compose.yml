services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authserver
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authserver"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authserver
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

  resource-service:
    build: ./resource-service
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-service:9000/oauth2/jwks
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:9000

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_SERVER_URL: http://localhost:9000
        VITE_CLIENT_ID: demo-web-app
        VITE_REDIRECT_URI: http://localhost:3000/callback
        VITE_RESOURCE_SERVER_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - auth-service

volumes:
  postgres-data:
